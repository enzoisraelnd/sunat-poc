AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Factoring Service - SUNAT SIRE Invoice Consultation

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [x86_64]
    MemorySize: 256
    Timeout: 90
    CodeUri: .
    Environment:
      Variables:
        CLIENTS_TABLE: !Ref ClientsTable
        TOKENS_CACHE_TABLE: !Ref TokensCacheTable
        INVOICES_CACHE_TABLE: !Ref InvoicesCacheTable
        S3_BUCKET: !Ref SireDownloadsBucket
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  LambdaRoleArn:
    Type: String
    Description: ARN del IAM Role existente que se asignará a todas las funciones Lambda

Resources:

  # ─── API Gateway ───────────────────────────────────────────────────────────

  FactoringApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "factoring-api-${Environment}"
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

  # ─── Lambdas ───────────────────────────────────────────────────────────────

  OnboardingCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "factoring-onboarding-create-${Environment}"
      Handler: src/handlers/onboarding-create.handler
      Role: !Ref LambdaRoleArn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FactoringApi
            Path: /onboarding
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints:
          - src/handlers/onboarding-create.ts

  OnboardingStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "factoring-onboarding-status-${Environment}"
      Handler: src/handlers/onboarding-status.handler
      Role: !Ref LambdaRoleArn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FactoringApi
            Path: /onboarding/{id}/status
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints:
          - src/handlers/onboarding-status.ts

  OnboardingActivateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "factoring-onboarding-activate-${Environment}"
      Handler: src/handlers/onboarding-activate.handler
      Role: !Ref LambdaRoleArn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FactoringApi
            Path: /onboarding/{id}/activate
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints:
          - src/handlers/onboarding-activate.ts

  InvoiceQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "factoring-invoice-query-${Environment}"
      Handler: src/handlers/invoice-query.handler
      Role: !Ref LambdaRoleArn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FactoringApi
            Path: /clients/{ruc}/invoices
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints:
          - src/handlers/invoice-query.ts

  InvoiceForceSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "factoring-invoice-force-sync-${Environment}"
      Handler: src/handlers/invoice-force-sync.handler
      Role: !Ref LambdaRoleArn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FactoringApi
            Path: /clients/{ruc}/invoices/sync
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints:
          - src/handlers/invoice-force-sync.ts

  # ─── DynamoDB Tables ───────────────────────────────────────────────────────

  ClientsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "factoring-clients-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ruc
          AttributeType: S
        - AttributeName: onboarding_id
          AttributeType: S
      KeySchema:
        - AttributeName: ruc
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: onboarding_id-index
          KeySchema:
            - AttributeName: onboarding_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TokensCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "factoring-tokens-cache-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ruc
          AttributeType: S
      KeySchema:
        - AttributeName: ruc
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  InvoicesCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "factoring-invoices-cache-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ruc_period
          AttributeType: S
      KeySchema:
        - AttributeName: ruc_period
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─── S3 ────────────────────────────────────────────────────────────────────

  SireDownloadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "factoring-sire-downloads-${Environment}-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldDownloads
            Status: Enabled
            ExpirationInDays: 90

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${FactoringApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  ClientsTableName:
    Value: !Ref ClientsTable
  InvoicesCacheTableName:
    Value: !Ref InvoicesCacheTable
